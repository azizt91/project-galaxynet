<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Admin - GALAXY.NET</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#FF6B2B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="GALAXY.NET">
    <meta name="description" content="Registrasi Admin untuk GALAXY.NET">
    
    <!-- PWA Icons -->
    <link rel="icon" type="image/png" sizes="512x512" href="assets/logo_512x512.png">
    <link rel="apple-touch-icon" sizes="192x192" href="assets/logo_192x192.png">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Fonts and Tailwind CSS -->
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link rel="stylesheet" as="style" onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&family=Manrope%3Awght%40400%3B500%3B700%3B800&family=Noto+Sans%3Awght%40400%3B500%3B700%3B900" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <style>
        :root { --orange-primary: #FF6B2B; --orange-glow: #FF8C42; --orange-dark: #E55A1C; }
        html, body { background: #080818 !important; }

        .gradient-bg {
            background: radial-gradient(ellipse at 60% 0%, #1a0a30 0%, #0a0818 40%, #050510 100%);
            position: relative; overflow: hidden;
        }
        .gradient-bg::before {
            content: ''; position: fixed; inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
                radial-gradient(1px 1px at 25% 55%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 40% 20%, rgba(255,255,255,0.9) 0%, transparent 100%),
                radial-gradient(1px 1px at 55% 75%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 35%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,0.8) 0%, transparent 100%),
                radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.9) 0%, transparent 100%),
                radial-gradient(2px 2px at 35% 90%, rgba(255,140,66,0.4) 0%, transparent 100%),
                radial-gradient(2px 2px at 75% 5%, rgba(255,140,66,0.3) 0%, transparent 100%);
            pointer-events: none; z-index: 0;
        }

        .glass-effect {
            background: rgba(10, 8, 30, 0.80); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 107, 43, 0.22);
            box-shadow: 0 0 50px rgba(255,107,43,0.07), 0 25px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
        }

        .floating-animation { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .fade-in { animation: fadeIn 0.9s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .logo-ring {
            background: linear-gradient(135deg, #0f0d28, #1c0d35);
            border: 2px solid rgba(255,107,43,0.45);
            box-shadow: 0 0 25px rgba(255,107,43,0.3), 0 0 70px rgba(255,107,43,0.1), inset 0 0 20px rgba(255,107,43,0.06);
        }

        .input-field {
            background: rgba(255,255,255,0.04) !important; border: 1px solid rgba(255,107,43,0.2) !important;
            color: #fff !important; transition: all 0.3s ease !important; border-radius: 12px !important;
            width: 100% !important; padding: 0.75rem 1rem 0.75rem 2.75rem !important;
        }
        .input-field::placeholder { color: rgba(255,255,255,0.3) !important; }
        .input-field:focus {
            outline: none !important; border-color: rgba(255,107,43,0.65) !important;
            background: rgba(255,107,43,0.06) !important;
            box-shadow: 0 0 0 3px rgba(255,107,43,0.12), 0 0 20px rgba(255,107,43,0.08) !important;
            transform: translateY(-1px) !important;
        }
        input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus {
            -webkit-text-fill-color: #ffffff !important;
            -webkit-box-shadow: 0 0 0px 1000px #0a081a inset !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .btn-register {
            background: linear-gradient(135deg, #FF6B2B 0%, #FF8C42 50%, #E55A1C 100%);
            border: none; color: #fff; font-weight: 700; letter-spacing: 0.5px; transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(255,107,43,0.45), 0 0 40px rgba(255,107,43,0.15);
            position: relative; overflow: hidden; width: 100%; padding: 0.75rem 1rem; border-radius: 12px; font-size: 1rem; cursor: pointer;
        }
        .btn-register::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent); transition: left 0.5s ease;
        }
        .btn-register:hover::before { left: 100%; }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,107,43,0.6), 0 0 60px rgba(255,107,43,0.2); }
        .btn-register:active { transform: translateY(0); }

        .label-text { color: rgba(255,190,130,0.75); font-size: 0.825rem; font-weight: 500; }
        .icon-orange { color: rgba(255,107,43,0.65); }
        .back-link { color: rgba(255,190,130,0.7); transition: color 0.2s ease; }
        .back-link:hover { color: #FF8C42; }
    </style>

    <!-- Mobile-First Layout Helper -->
    <style id="mobile-first-styles">
        html { background: #080818 !important; }
        body { max-width: 480px !important; margin: 0 auto !important; min-height: 100vh !important; position: relative !important; box-shadow: 0 0 80px rgba(0,0,0,0.7) !important; background-color: #080818; }
        .fixed { position: fixed !important; max-width: 480px !important; left: 50% !important; right: auto !important; transform: translateX(-50%) !important; width: 100% !important; }
        .fixed.inset-0 { left: 50% !important; transform: translateX(-50%) !important; width: 100% !important; max-width: 480px !important; }
    </style>
</head>
<body>
    <div class="gradient-bg min-h-screen flex items-center justify-center p-4" style='font-family: Manrope, "Noto Sans", sans-serif;'>
      <div class="w-full max-w-md" style="position: relative; z-index: 1;">
        <!-- Logo and Brand -->
        <div class="text-center mb-8 fade-in">
          <div class="floating-animation">
            <div class="logo-ring mx-auto mb-5 rounded-full flex items-center justify-center" style="width:92px; height:92px;">
              <img id="register-logo" src="assets/galaxy.png" alt="Logo" class="object-contain" style="width:60px; height:60px; filter: drop-shadow(0 0 10px rgba(255,107,43,0.55));">
            </div>
          </div>
          <img id="register-app-name" src="assets/galaxynet.png" alt="GALAXY.NET" class="mx-auto mb-2 object-contain" style="height: 48px; filter: drop-shadow(0 0 14px rgba(255,107,43,0.45));">
        </div>

        <!-- Register Form -->
        <div class="glass-effect rounded-2xl p-8 shadow-2xl fade-in">
          <div class="text-center mb-7">
            <h2 class="text-2xl font-bold mb-1" style="color: #fff; letter-spacing: 0.3px;">Daftar Admin Baru</h2>
            <p style="color: rgba(255,190,130,0.6); font-size: 0.875rem;">Buat akun administrator</p>
          </div>

          <form id="register-form" class="space-y-5">
            <!-- Full Name Input -->
            <div class="space-y-1">
              <label for="full-name" class="block label-text">Nama Lengkap</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <svg class="h-5 w-5 icon-orange" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                  </svg>
                </div>
                <input id="full-name" type="text" placeholder="Masukkan nama lengkap" class="input-field" required />
              </div>
            </div>

            <!-- Email Input -->
            <div class="space-y-1">
              <label for="email" class="block label-text">Email</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <svg class="h-5 w-5 icon-orange" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                  </svg>
                </div>
                <input id="email" type="email" placeholder="admin@galaxynet.com" class="input-field" required />
              </div>
            </div>

            <!-- Password Input -->
            <div class="space-y-1">
              <label for="password" class="block label-text">Password</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <svg class="h-5 w-5 icon-orange" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                  </svg>
                </div>
                <input id="password" type="password" placeholder="Minimal 6 karakter" class="input-field" required minlength="6" />
              </div>
              <p style="color: rgba(255,255,255,0.3); font-size: 0.75rem;">Password minimal 6 karakter</p>
            </div>

            <!-- Register Button -->
            <button type="submit" class="btn-register mt-2">
              <span class="flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                </svg>
                Daftar
              </span>
            </button>

            <!-- Error Message -->
            <p id="error-message" class="text-red-400 text-center text-sm mt-2 hidden"></p>
            <!-- Success Message -->
            <p id="success-message" class="text-green-400 text-center text-sm mt-2 hidden"></p>
          </form>
          
          <!-- Back to Login -->
          <div class="mt-6 text-center">
            <a href="index.html" class="back-link text-sm">← Kembali ke Login</a>
          </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-8 fade-in">
          <p style="color: rgba(255,255,255,0.25); font-size: 0.75rem;">© 2025 GALAXY.NET. Semua hak dilindungi.</p>
        </div>
      </div>

      <!-- Background Glow Decorations -->
      <div class="fixed inset-0 overflow-hidden pointer-events-none" style="z-index: 0;">
        <div class="absolute rounded-full" style="top:-150px; right:-100px; width:400px; height:400px; background: radial-gradient(ellipse, rgba(255,107,43,0.12) 0%, transparent 70%); filter: blur(30px);"></div>
        <div class="absolute rounded-full" style="bottom:-150px; left:-100px; width:400px; height:400px; background: radial-gradient(ellipse, rgba(255,107,43,0.08) 0%, transparent 70%); filter: blur(30px);"></div>
        <div class="absolute rounded-full" style="top:40%; left:3%; width:200px; height:200px; background: radial-gradient(ellipse, rgba(120,60,220,0.12) 0%, transparent 70%); filter: blur(20px);"></div>
      </div>
    </div>
    
    <script type="module" src="supabase-client.js"></script>
    <script type="module" src="apply-settings.js"></script>
    <script type="module" src="register.js"></script>
    <script src="pwa-installer.js?v=5"></script>
</body>
</html>
