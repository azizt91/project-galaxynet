<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GALAXY.NET</title>

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#FF6B2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="GALAXY.NET">
  <meta name="description" content="Sistem manajemen pelanggan ISP dengan integrasi Google Sheets">

  <!-- PWA Icons -->
  <link rel="icon" type="image/png" sizes="512x512" href="assets/logo_512x512.png">
  <link rel="apple-touch-icon" sizes="192x192" href="assets/logo_192x192.png">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Fonts and Tailwind CSS -->
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
  <link rel="stylesheet" as="style" onload="this.rel='stylesheet'"
    href="https://fonts.googleapis.com/css2?display=swap&family=Manrope%3Awght%40400%3B500%3B700%3B800&family=Noto+Sans%3Awght%40400%3B500%3B700%3B900" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <style>
    /* === GALAXY.NET Dark Space + Orange Theme === */
    :root {
      --orange-primary: #FF6B2B;
      --orange-glow: #FF8C42;
      --orange-dark: #E55A1C;
    }

    html,
    body {
      background: #080818 !important;
    }

    .gradient-bg {
      background: radial-gradient(ellipse at 60% 0%, #1a0a30 0%, #0a0818 40%, #050510 100%);
      position: relative;
      overflow: hidden;
    }

    /* Starfield effect */
    .gradient-bg::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255, 255, 255, 0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 55%, rgba(255, 255, 255, 0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 20%, rgba(255, 255, 255, 0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 75%, rgba(255, 255, 255, 0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 35%, rgba(255, 255, 255, 0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 60%, rgba(255, 255, 255, 0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 80%, rgba(255, 255, 255, 0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 10%, rgba(255, 255, 255, 0.9) 0%, transparent 100%),
        radial-gradient(2px 2px at 35% 90%, rgba(255, 140, 66, 0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 75% 5%, rgba(255, 140, 66, 0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 45%, rgba(255, 255, 255, 0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 40%, rgba(255, 255, 255, 0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 85%, rgba(255, 255, 255, 0.6) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .glass-effect {
      background: rgba(10, 8, 30, 0.80);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 107, 43, 0.22);
      box-shadow:
        0 0 50px rgba(255, 107, 43, 0.07),
        0 25px 60px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .floating-animation {
      animation: floating 3s ease-in-out infinite;
    }

    @keyframes floating {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .fade-in {
      animation: fadeIn 0.9s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo ring */
    .logo-ring {
      background: linear-gradient(135deg, #0f0d28, #1c0d35);
      border: 2px solid rgba(255, 107, 43, 0.45);
      box-shadow:
        0 0 25px rgba(255, 107, 43, 0.3),
        0 0 70px rgba(255, 107, 43, 0.1),
        inset 0 0 20px rgba(255, 107, 43, 0.06);
    }

    /* Input fields */
    .input-field {
      background: rgba(255, 255, 255, 0.04) !important;
      border: 1px solid rgba(255, 107, 43, 0.2) !important;
      color: #fff !important;
      transition: all 0.3s ease !important;
      border-radius: 12px !important;
      width: 100% !important;
      padding: 0.75rem 1rem 0.75rem 2.75rem !important;
    }

    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.3) !important;
    }

    .input-field:focus {
      outline: none !important;
      border-color: rgba(255, 107, 43, 0.65) !important;
      background: rgba(255, 107, 43, 0.06) !important;
      box-shadow: 0 0 0 3px rgba(255, 107, 43, 0.12), 0 0 20px rgba(255, 107, 43, 0.08) !important;
      transform: translateY(-1px) !important;
    }

    /* Fix Chrome autofill background */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: #ffffff !important;
      -webkit-box-shadow: 0 0 0px 1000px #0a081a inset !important;
      transition: background-color 5000s ease-in-out 0s;
    }

    /* Login button */
    .btn-login {
      background: linear-gradient(135deg, #FF6B2B 0%, #FF8C42 50%, #E55A1C 100%);
      border: none;
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      box-shadow:
        0 4px 20px rgba(255, 107, 43, 0.45),
        0 0 40px rgba(255, 107, 43, 0.15);
      position: relative;
      overflow: hidden;
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.18), transparent);
      transition: left 0.5s ease;
    }

    .btn-login:hover::before {
      left: 100%;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow:
        0 8px 30px rgba(255, 107, 43, 0.6),
        0 0 60px rgba(255, 107, 43, 0.2);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .label-text {
      color: rgba(255, 190, 130, 0.75);
      font-size: 0.825rem;
      font-weight: 500;
    }

    .register-link {
      color: #FF8C42;
      font-weight: 700;
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }

    .register-link:hover {
      color: #FFA060;
      text-shadow: 0 0 10px rgba(255, 107, 43, 0.5);
    }

    .icon-orange {
      color: rgba(255, 107, 43, 0.65);
    }
  </style>

  <!-- Mobile-First Layout Helper -->
  <style id="mobile-first-styles">
    html {
      background: #080818 !important;
    }

    body {
      max-width: 480px !important;
      margin: 0 auto !important;
      min-height: 100vh !important;
      position: relative !important;
      box-shadow: 0 0 80px rgba(0, 0, 0, 0.7) !important;
      background-color: #080818;
    }

    .fixed {
      position: fixed !important;
      max-width: 480px !important;
      left: 50% !important;
      right: auto !important;
      transform: translateX(-50%) !important;
      width: 100% !important;
    }

    .fixed.inset-0 {
      left: 50% !important;
      transform: translateX(-50%) !important;
      width: 100% !important;
      max-width: 480px !important;
    }
  </style>

</head>

<body>
  <div class="gradient-bg min-h-screen flex items-center justify-center p-4"
    style='font-family: Manrope, "Noto Sans", sans-serif;'>

    <div class="w-full max-w-md" style="position: relative; z-index: 1;">
      <!-- Logo and Brand -->
      <div class="text-center mb-8 fade-in">
        <div class="floating-animation">
          <div class="logo-ring mx-auto mb-5 rounded-full flex items-center justify-center"
            style="width: 92px; height: 92px;">
            <img id="login-logo" src="assets/galaxy.png" alt="Logo" class="object-contain"
              style="width:60px; height:60px; filter: drop-shadow(0 0 10px rgba(255,107,43,0.55));">
          </div>
        </div>
        <img id="login-app-name" src="assets/galaxynet.png" alt="GALAXY.NET" class="mx-auto mb-2 object-contain"
          style="height: 48px; filter: drop-shadow(0 0 14px rgba(255,107,43,0.45));">
      </div>

      <!-- Login Form -->
      <div class="glass-effect rounded-2xl p-8 shadow-2xl fade-in">
        <div class="text-center mb-7">
          <h2 class="text-2xl font-bold mb-2" style="color: #ffffff; letter-spacing: 0.3px;">Welcome Back</h2>
          <p style="color: rgba(255,190,130,0.6); font-size: 0.875rem;">Silakan masuk ke akun Anda</p>
        </div>

        <form id="login-form" class="space-y-5">
          <!-- Email Input -->
          <div class="space-y-1">
            <label for="email" class="block label-text">Email</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="h-5 w-5 icon-orange" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
              </div>
              <input id="email" type="email" placeholder="Masukkan email" class="input-field" required />
            </div>
          </div>

          <!-- Password Input -->
          <div class="space-y-1">
            <label for="password" class="block label-text">Password</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="h-5 w-5 icon-orange" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
              </div>
              <input id="password" type="password" placeholder="Masukkan password" class="input-field" required />
            </div>
          </div>

          <!-- Login Button -->
          <button type="submit" class="btn-login mt-2">
            <span class="flex items-center justify-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
              </svg>
              Masuk
            </span>
          </button>

          <!-- Error Message -->
          <p id="error-message" class="text-red-400 text-center text-sm mt-2 hidden"></p>
        </form>

        <!-- Register Link -->
        <div class="mt-6 text-center">
          <p style="color: rgba(255,255,255,0.4); font-size: 0.875rem;">
            Belum punya akun admin?
            <a href="register.html" class="register-link">Daftar Sekarang</a>
          </p>
        </div>
      </div>

      <!-- Footer -->
      <div class="text-center mt-8 fade-in">
        <p style="color: rgba(255,255,255,0.25); font-size: 0.75rem;">
          © 2026 GALAXY.NET. Semua hak dilindungi.
        </p>
      </div>
    </div>

    <!-- Background Glow Decorations -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none" style="z-index: 0;">
      <div class="absolute rounded-full" style="top:-150px; right:-100px; width:400px; height:400px;
               background: radial-gradient(ellipse, rgba(255,107,43,0.12) 0%, transparent 70%);
               filter: blur(30px);"></div>
      <div class="absolute rounded-full" style="bottom:-150px; left:-100px; width:400px; height:400px;
               background: radial-gradient(ellipse, rgba(255,107,43,0.08) 0%, transparent 70%);
               filter: blur(30px);"></div>
      <div class="absolute rounded-full" style="top:40%; left:3%; width:200px; height:200px;
               background: radial-gradient(ellipse, rgba(120,60,220,0.12) 0%, transparent 70%);
               filter: blur(20px);"></div>
    </div>
  </div>

  <script type="module" src="supabase-client.js"></script>
  <script type="module" src="apply-settings.js"></script>
  <script type="module" src="login.js"></script>
  <script src="pwa-installer.js"></script>
</body>

</html>
